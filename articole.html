<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regorder — Articole</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--red:#C0181A;--red-dim:rgba(192,24,26,0.15);--bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--border:rgba(255,255,255,0.07);--text:#e8e8e2;--muted:rgba(232,232,226,0.4);--mono:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--red)}
  nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
  .nav-logo-text{font-family:var(--display);font-size:22px;letter-spacing:5px;color:var(--text)}
  .nav-links{display:flex;align-items:center;gap:36px;list-style:none}
  .nav-links a{font-size:14px;letter-spacing:0.3px;color:var(--muted);text-decoration:none;transition:color .2s}
  .nav-links a:hover,.nav-links a.active{color:var(--red)}
  .nav-live{display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:0.3px;color:var(--red)}
  .nav-live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  .main{padding:100px 64px 64px;min-height:100vh}
  .sec-eyebrow{font-size:11px;letter-spacing:1px;color:var(--red);margin-bottom:10px;text-transform:uppercase}
  .sec-title{font-family:var(--display);font-size:52px;letter-spacing:4px;line-height:1}
  .sec-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:48px}
  .sec-count{font-size:13px;letter-spacing:0.3px;color:var(--muted)}
  footer{padding:40px 64px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .footer-logo{font-family:var(--display);font-size:18px;letter-spacing:6px}
  .footer-tagline{font-size:12px;letter-spacing:0.3px;color:var(--red)}
  .footer-copy{font-size:12px;letter-spacing:0.3px;color:var(--muted)}

  .art-card{background:var(--bg2);border:1px solid var(--border);padding:48px;display:grid;grid-template-columns:1fr 260px;gap:48px;align-items:start;position:relative;overflow:hidden;transition:border-color .25s;margin-bottom:2px}
  .art-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--red);transition:height .3s}
  .art-card:hover{border-color:rgba(192,24,26,.3)}.art-card:hover::before{height:100%}
  .art-num{font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:12px}
  .art-num::after{content:'';flex:1;height:1px;background:var(--border)}
  .art-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:0.5px;padding:4px 12px;border:1px solid currentColor;margin-bottom:20px}
  .art-status.active{color:var(--red)}.art-status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1s infinite}
  .art-title{font-family:var(--display);font-size:38px;letter-spacing:3px;line-height:1.05;margin-bottom:20px}
  .art-body{font-size:15px;line-height:1.8;color:var(--muted);margin-bottom:16px}
  .art-quote{color:rgba(192,24,26,0.85);font-style:italic;font-size:15px;line-height:1.7;margin-bottom:8px}
  .art-quote-src{font-size:11px;letter-spacing:0.5px;color:rgba(255,255,255,0.2)}
  .art-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
  .doc-tag{font-size:11px;letter-spacing:0.3px;color:var(--muted);border:1px solid var(--border);padding:4px 10px}
  .art-sidebar{border-left:1px solid var(--border);padding-left:28px;display:flex;flex-direction:column;gap:18px}
  .sb-lbl{font-size:11px;letter-spacing:0.5px;color:var(--red);margin-bottom:6px;text-transform:uppercase}
  .sb-val{font-size:13px;letter-spacing:0.2px;color:var(--text);line-height:1.6}
  .prog-bar{height:2px;background:var(--border);margin-top:6px}.prog-fill{height:100%;background:var(--red)}
  .art-coming{background:transparent;border:1px dashed rgba(255,255,255,0.06);padding:24px;display:flex;align-items:center;justify-content:space-between;opacity:.35;margin-bottom:2px}
  .loading-state{text-align:center;padding:80px;font-size:14px;color:var(--muted)}
  .empty-state{text-align:center;padding:80px;font-size:14px;color:rgba(255,255,255,0.15);border:1px dashed rgba(255,255,255,0.06)}
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
  .reveal.visible{opacity:1;transform:translateY(0)}




/* ── HAMBURGER (hidden on desktop) */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:none;border:none;padding:4px;flex-shrink:0;z-index:901}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);transition:all .25s;border-radius:1px}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);background:var(--red)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);background:var(--red)}

@media screen and (max-width:768px){

  /* ── NAV ── */
  nav{padding:0 16px !important;height:56px !important}
  .nav-logo-text{font-size:17px !important;letter-spacing:3px !important}
  .nav-links{display:none !important;position:fixed !important;top:56px !important;left:0 !important;right:0 !important;background:rgba(6,6,6,0.98) !important;backdrop-filter:blur(20px) !important;-webkit-backdrop-filter:blur(20px) !important;border-bottom:1px solid var(--border) !important;flex-direction:column !important;padding:8px 0 16px !important;gap:0 !important;z-index:800 !important;list-style:none !important;margin:0 !important;width:100% !important;align-items:flex-start !important}
  .nav-links.open{display:flex !important}
  .nav-links li{border-bottom:1px solid rgba(255,255,255,0.05);width:100%}
  .nav-links li:last-child{border-bottom:none}
  .nav-links a{display:block !important;padding:14px 24px !important;font-size:13px !important;letter-spacing:3px !important;color:var(--muted) !important;text-decoration:none}
  .nav-links a.active,.nav-links a:hover{color:var(--red) !important}
  .hamburger{display:flex !important}
  .nav-live{font-size:10px !important;gap:5px !important}
  .nav-live-dot{width:6px !important;height:6px !important}

  /* ── FOOTER ── */
  footer{padding:28px 20px !important;flex-direction:column !important;align-items:flex-start !important;gap:6px !important}
}

@media screen and (max-width:768px){
  .main{padding:80px 16px 60px !important}
  .sec-header{flex-direction:column !important;align-items:flex-start !important;gap:8px !important;margin-bottom:24px !important}
  .sec-title{font-size:36px !important;letter-spacing:2px !important}
  .art-card{grid-template-columns:1fr !important;padding:24px 16px !important;gap:20px !important}
  .art-sidebar{border-left:none !important;border-top:1px solid var(--border) !important;padding-left:0 !important;padding-top:16px !important}
  .art-title{font-size:26px !important;letter-spacing:1px !important}
  .art-coming{flex-direction:column !important;gap:8px !important;padding:16px !important}
}

</style>
</head>
<body>
<nav>
  <a href="index" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#C0181A" stroke-width="1.5"/><circle cx="14" cy="14" r="5" stroke="#C0181A" stroke-width="1.5"/><circle cx="14" cy="14" r="2" fill="#C0181A"/><line x1="20" y1="20" x2="25" y2="25" stroke="#C0181A" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="nav-logo-text">REGORDER</span>
  </a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index">ACASĂ</a></li>
    <li><a href="articole" class="active">ARTICOLE</a></li>
    <li><a href="dosare">DOSARE</a></li>
    <li><a href="documentare">DOCUMENTARE</a></li>
    <li><a href="cariere">CARIERE</a></li>
    <li><a href="echipa">ECHIPĂ</a></li>
  </ul>
  <div class="nav-live"><div class="nav-live-dot"></div>INVESTIGAȚIE ACTIVĂ</div>


  <button class="hamburger" id="ham" onclick="this.classList.toggle('open');document.getElementById('nav-links').classList.toggle('open')" aria-label="Meniu"><span></span><span></span><span></span></button>
</nav>

<div class="main">
  <div class="sec-header reveal">
    <div><div class="sec-eyebrow">// Publicații</div><h1 class="sec-title">ARTICOLE</h1></div>
    <div class="sec-count" id="art-count">SE ÎNCARCĂ...</div>
  </div>
  <div id="articole-container"><div class="loading-state">Se încarcă articolele...</div></div>
</div>

<footer>
  <div class="footer-logo">REGORDER</div>
  <div class="footer-tagline">ADEVĂRUL NU SE ASCUNDE · SE FILMEAZĂ</div>
  <div class="footer-copy">INVESTIGAȚII · LIVE</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const sb = supabase.createClient(
  'https://wrjvymujwjsjytigzdua.supabase.co',
  'sb_publishable_QyUQNEp_twQDM_yJBj4VDg_Y5QIxkAB'
);

function statusMap(s) {
  if (s==='activ') return 'INVESTIGAȚIE ACTIVĂ';
  if (s==='finalizat') return 'FINALIZAT';
  return 'DRAFT';
}

async function loadArticole() {
  const container = document.getElementById('articole-container');
  const countEl = document.getElementById('art-count');

  const { data, error } = await sb.from('articole')
    .select('*')
    .eq('publicat', true)
    .order('created_at', { ascending: false });

  if (error || !data?.length) {
    container.innerHTML = '<div class="empty-state">Niciun articol publicat încă.</div>';
    countEl.textContent = '0 articole';
    return;
  }

  countEl.textContent = data.length + (data.length === 1 ? ' articol publicat' : ' articole publicate');

  // Articol deschis
  let openId = null;

  function renderArticole(data) {
    container.innerHTML = data.map((a, i) => {
      const isOpen = openId === a.id;
      const preview = a.rezumat || (a.continut || '').split('\n').filter(p=>p.trim())[0] || '';
      return `
      <div class="art-card reveal" id="art-${a.id}" style="cursor:pointer" onclick="toggleArticol('${a.id}', ${JSON.stringify(data).replace(/"/g,'&quot;')})">
        <div>
          <div class="art-num">ARTICOL · ${String(i+1).padStart(3,'0')} &nbsp;·&nbsp; ${new Date(a.created_at).toLocaleDateString('ro',{day:'numeric',month:'long',year:'numeric'})}</div>
          <div class="art-status active"><span class="art-status-dot"></span>${statusMap(a.status)}</div>
          <h2 class="art-title">${a.titlu}</h2>
          ${isOpen
            ? (a.continut ? a.continut.split('\n').filter(p=>p.trim()).map(p =>
                p.startsWith('"') ? `<p class="art-quote">${p}</p>` : `<p class="art-body">${p}</p>`
              ).join('') : `<p class="art-body">${preview}</p>`)
            : `<p class="art-body">${preview}</p>${a.continut && a.continut.length > preview.length ? '<div style="font-size:12px;color:var(--red);margin-top:12px">→ Citește tot articolul</div>' : ''}`
          }
          ${isOpen && (a.tags||[]).length ? `<div class="art-tags">${a.tags.map(t=>`<span class="doc-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
        <div class="art-sidebar" onclick="event.stopPropagation()">
          <div><div class="sb-lbl">Reporter</div><div class="sb-val">${a.reporter||'—'}</div></div>
          ${a.locatie ? `<div><div class="sb-lbl">Locație</div><div class="sb-val">${a.locatie}</div></div>` : ''}
          <div style="border-top:1px solid var(--border);padding-top:14px"><div class="sb-lbl">Data publicării</div><div class="sb-val" style="font-size:12px;color:var(--muted)">${new Date(a.created_at).toLocaleDateString('ro')}</div></div>
          ${(a.tags||[]).length && !isOpen ? `<div style="border-top:1px solid var(--border);padding-top:14px"><div class="art-tags" style="flex-wrap:wrap">${a.tags.map(t=>`<span class="doc-tag">${t}</span>`).join('')}</div></div>` : ''}
        </div>
      </div>`;
    }).join('') + `<div class="art-coming reveal"><div style="font-size:11px;color:var(--red)">+ Articol următor</div><div style="font-size:12px;color:var(--muted)">Urmează după finalizarea investigației</div></div>`;

    const obs = new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  }

  window.toggleArticol = function(id, data) {
    openId = openId === id ? null : id;
    renderArticole(data);
    if (openId) {
      setTimeout(() => {
        const el = document.getElementById('art-' + id);
        if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
      }, 50);
    }
  };

  renderArticole(data);

}

loadArticole();
const obs = new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
